<!-- I2S DIN: J1 pin38 → J3 -->
<polyline points="577,513 577,455" class="trace"/>

<!-- SPI MOSI: J1→J2 -->
<polyline points="324,513 324,440 250,440 250,131" class="trace"/>

<!-- SPI SCLK: J1→J2 -->
<polyline points="347,513 347,445 270,445 270,131" class="trace"/>

