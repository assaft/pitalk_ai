<text x="410" y="315" text-anchor="middle" class="silk silk-sm">I2S Class-D</text>
<text x="410" y="330" text-anchor="middle" class="silk silk-sm">Mono Amp</text>
<text x="356" y="217" class="silk silk-sm">U1</text>
<!-- Left pads: VDD, GND, BCLK, LRCLK, DIN -->
<rect x="337" y="230" width="12" height="10" rx="1" class="pad-smd"/>
<rect x="337" y="250" width="12" height="10" rx="1" class="pad-smd"/>
<rect x="337" y="270" width="12" height="10" rx="1" class="pad-smd"/>
<rect x="337" y="290" width="12" height="10" rx="1" class="pad-smd"/>
<rect x="337" y="310" width="12" height="10" rx="1" class="pad-smd"/>
<text x="328" y="238" text-anchor="end" class="pwr-lbl">VDD</text>
<text x="328" y="258" text-anchor="end" class="gnd-lbl">GND</text>
<text x="328" y="278" text-anchor="end" class="net-lbl">BCLK</text>
<text x="328" y="298" text-anchor="end" class="net-lbl">LRCLK</text>
<text x="328" y="318" text-anchor="end" class="net-lbl">DIN</text>
<!-- Right pads: SD_MODE, GAIN, OUT+, OUT- -->
<rect x="473" y="230" width="12" height="10" rx="1" class="pad-smd"/>
<rect x="473" y="250" width="12" height="10" rx="1" class="pad-smd"/>
<rect x="473" y="270" width="12" height="10" rx="1" class="pad-smd"/>
<rect x="473" y="290" width="12" height="10" rx="1" class="pad-smd"/>
