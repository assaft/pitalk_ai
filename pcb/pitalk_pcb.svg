<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 720" width="860" height="720">
<defs>
  <style>
    .bg        { fill:#111318; }
    .pcb       { fill:#1a5e1a; }
    .pcb-edge  { fill:none; stroke:#c8a000; stroke-width:2.5; }
    .mhole     { fill:#0a2e0a; stroke:#d4a017; stroke-width:1.8; }
    .mhole-i   { fill:#111318; }
    .comp-body { fill:#252510; stroke:#d0d0a0; stroke-width:1.2; }
    .ic-body   { fill:#1a1008; stroke:#d0c080; stroke-width:1.5; }
    .pad-th    { fill:#d4a017; }
    .pad-smd   { fill:#d4a017; }
    .trace     { fill:none; stroke:#c8900a; stroke-width:1.8; stroke-opacity:0.75; }
    .silk      { fill:#e8e8e8; font-family:'Courier New',monospace; }
    .silk-sm   { font-size:10px; }
    .silk-md   { font-size:12px; }
    .silk-lg   { font-size:14px; font-weight:bold; }
    .net-lbl   { fill:#60e060; font-family:'Courier New',monospace; font-size:9px; }
    .pwr-lbl   { fill:#e06060; font-family:'Courier New',monospace; font-size:9px; }
    .gnd-lbl   { fill:#6080e0; font-family:'Courier New',monospace; font-size:9px; }
    .title-t   { fill:#ffffff; font-family:Arial,sans-serif; }
    .legend-t  { fill:#c8c8c8; font-family:'Courier New',monospace; font-size:10px; }
    .dim-line  { stroke:#606090; stroke-width:1; stroke-dasharray:4 3; fill:none; }
    .dim-text  { fill:#8090c0; font-family:Arial,sans-serif; font-size:10px; }
  </style>
</defs>

<!-- ═══════════════════════════════════════════════════ -->
<!-- Background & title                                  -->
<!-- ═══════════════════════════════════════════════════ -->
<rect width="860" height="720" class="bg"/>

<text x="430" y="32" text-anchor="middle" class="title-t" font-size="20" font-weight="bold">PiTalk — Custom PCB  (Top View)</text>
<text x="430" y="54" text-anchor="middle" class="title-t" font-size="12">65 × 55 mm · 2-layer FR4 · Rev 1.0</text>

<!-- ═══════════════════════════════════════════════════ -->
<!-- PCB board  65mm × 55mm  scale=9px/mm               -->
<!-- SVG origin of PCB top-left corner: (95, 70)        -->
<!-- 65mm → 585px   55mm → 495px                        -->
<!-- ═══════════════════════════════════════════════════ -->
<rect x="95" y="70" width="585" height="495" rx="8" class="pcb"/>
<rect x="95" y="70" width="585" height="495" rx="8" class="pcb-edge"/>

<!-- Dimension arrows -->
<line x1="95" y1="58" x2="680" y2="58" class="dim-line"/>
<text x="387" y="56" text-anchor="middle" class="dim-text">65 mm</text>
<line x1="83" y1="70" x2="83" y2="565" class="dim-line"/>
<text x="78" y="320" text-anchor="middle" class="dim-text" transform="rotate(-90,78,320)">55 mm</text>

<!-- Mounting holes  3 mm from each corner  drill Ø3.2 mm → r=14.4px≈14px -->
<circle cx="122" cy="97"  r="14" class="mhole"/><circle cx="122" cy="97"  r="7" class="mhole-i"/>
<circle cx="653" cy="97"  r="14" class="mhole"/><circle cx="653" cy="97"  r="7" class="mhole-i"/>
<circle cx="122" cy="538" r="14" class="mhole"/><circle cx="122" cy="538" r="7" class="mhole-i"/>
<circle cx="653" cy="538" r="14" class="mhole"/><circle cx="653" cy="538" r="7" class="mhole-i"/>

<!-- ═══════════════════════════════════════════════════ -->
<!-- J2  Screen keyed locking connector  1×15  2.54mm pitch -->
<!-- PCB pos: x=5mm y=3mm  →  SVG (140, 97)             -->
<!-- 15 pins × 2.54mm = 38.1mm → 343px wide             -->
<!-- ═══════════════════════════════════════════════════ -->
<rect x="140" y="97" width="343" height="45" rx="3" class="comp-body"/>
<!-- 15 pads, 22.9px pitch -->
<text x="311" y="112" text-anchor="middle" class="silk silk-md">J2 · Screen Locking 1×15</text>
<!-- pads -->
<rect x="148" y="118" width="13" height="13" rx="2" class="pad-th"/>
<rect x="171" y="118" width="13" height="13" rx="2" class="pad-th"/>
<rect x="194" y="118" width="13" height="13" rx="2" class="pad-th"/>
<rect x="217" y="118" width="13" height="13" rx="2" class="pad-th"/>
<rect x="240" y="118" width="13" height="13" rx="2" class="pad-th"/>
<rect x="263" y="118" width="13" height="13" rx="2" class="pad-th"/>
<rect x="286" y="118" width="13" height="13" rx="2" class="pad-th"/>
<rect x="309" y="118" width="13" height="13" rx="2" class="pad-th"/>
<rect x="332" y="118" width="13" height="13" rx="2" class="pad-th"/>
<rect x="355" y="118" width="13" height="13" rx="2" class="pad-th"/>
<rect x="378" y="118" width="13" height="13" rx="2" class="pad-th"/>
<rect x="401" y="118" width="13" height="13" rx="2" class="pad-th"/>
<rect x="424" y="118" width="13" height="13" rx="2" class="pad-th"/>
<rect x="447" y="118" width="13" height="13" rx="2" class="pad-th"/>
<rect x="470" y="118" width="13" height="13" rx="2" class="pad-th"/>
<!-- pin labels -->
<text x="154" y="148" class="gnd-lbl">GND</text>
<text x="177" y="148" class="pwr-lbl">3V3</text>
<text x="245" y="148" class="net-lbl">MOSI</text>
<text x="268" y="148" class="net-lbl">SCK</text>
<text x="291" y="148" class="net-lbl">CS</text>
<text x="314" y="148" class="net-lbl">DC</text>
<text x="337" y="148" class="net-lbl">RST</text>
<text x="358" y="148" class="net-lbl">SDA</text>
<text x="381" y="148" class="net-lbl">SCL</text>
<text x="404" y="148" class="net-lbl">INT</text>
<text x="427" y="148" class="net-lbl">BL</text>

<!-- ═══════════════════════════════════════════════════ -->
<!-- J3  Mic male pin header  2×3  2.54mm pitch         -->
<!-- PCB pos: x=47mm y=2mm  →  SVG (518, 88)            -->
<!-- 3 cols × 2.54mm = 7.62mm → 68px  2 rows            -->
<!-- ═══════════════════════════════════════════════════ -->
<rect x="516" y="88" width="84" height="62" rx="3" class="comp-body"/>
<text x="558" y="102" text-anchor="middle" class="silk silk-sm">J3 · Mic Male 2×3</text>
<!-- Row A (power): VDD, GND, L/R  y=107 -->
<rect x="524" y="107" width="13" height="13" rx="2" class="pad-th"/>
<rect x="547" y="107" width="13" height="13" rx="2" class="pad-th"/>
<rect x="570" y="107" width="13" height="13" rx="2" class="pad-th"/>
<!-- Row B (signals): SCK, WS, SD  y=130 -->
<rect x="524" y="130" width="13" height="13" rx="2" class="pad-th"/>
<rect x="547" y="130" width="13" height="13" rx="2" class="pad-th"/>
<rect x="570" y="130" width="13" height="13" rx="2" class="pad-th"/>
<!-- Row A labels above -->
<text x="524" y="105" class="pwr-lbl">3V3</text>
<text x="547" y="105" class="gnd-lbl">GND</text>
<text x="567" y="105" class="gnd-lbl">L/R</text>
<!-- Row B labels below -->
<text x="521" y="156" class="net-lbl">SCK</text>
<text x="544" y="156" class="net-lbl">WS</text>
<text x="570" y="156" class="net-lbl">SD</text>
<!-- cable group labels -->
<text x="602" y="118" class="net-lbl">← cable A</text>
<text x="602" y="141" class="net-lbl">← cable B</text>

<!-- ═══════════════════════════════════════════════════ -->
<!-- J4  Speaker screw terminal  1×2  5mm pitch         -->
<!-- PCB pos: x=2mm y=18mm  →  SVG (113, 232)           -->
<!-- 2 pins × 5mm = 10mm → 90px                         -->
<!-- ═══════════════════════════════════════════════════ -->
<rect x="108" y="220" width="50" height="80" rx="3" class="comp-body"/>
<text x="133" y="237" text-anchor="middle" class="silk silk-sm">J4</text>
<text x="133" y="250" text-anchor="middle" class="silk silk-sm">Spk</text>
<rect x="116" y="254" width="18" height="18" rx="3" class="pad-th"/>
<rect x="116" y="278" width="18" height="18" rx="3" class="pad-th"/>
<text x="140" y="267" class="net-lbl">OUT+</text>
<text x="140" y="291" class="net-lbl">OUT−</text>

<!-- ═══════════════════════════════════════════════════ -->
<!-- J5  Button connector  1×4  2.54mm pitch            -->
<!-- PCB pos: x=2mm y=29mm  →  SVG (113, 331)           -->
<!-- ═══════════════════════════════════════════════════ -->
<rect x="108" y="326" width="50" height="105" rx="3" class="comp-body"/>
<text x="133" y="343" text-anchor="middle" class="silk silk-sm">J5</text>
<text x="133" y="356" text-anchor="middle" class="silk silk-sm">Btn</text>
<rect x="116" y="360" width="13" height="13" rx="2" class="pad-th"/>
<rect x="116" y="383" width="13" height="13" rx="2" class="pad-th"/>
<rect x="116" y="406" width="13" height="13" rx="2" class="pad-th"/>
<rect x="116" y="429" width="13" height="13" rx="2" class="pad-th"/>
<text x="140" y="370" class="net-lbl">SW</text>
<text x="140" y="393" class="gnd-lbl">GND</text>
<text x="140" y="416" class="net-lbl">LED+</text>
<text x="140" y="439" class="gnd-lbl">GND</text>

<!-- ═══════════════════════════════════════════════════ -->
<!-- U1  MAX98357A  (shown enlarged for readability)    -->
<!-- PCB pos: x=28mm y=19mm  →  SVG (347, 241)          -->
