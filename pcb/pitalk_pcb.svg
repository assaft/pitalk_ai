<!-- ═══════════════════════════════════════════════════ -->
<!-- Copper traces (simplified key routes)              -->
<!-- ═══════════════════════════════════════════════════ -->

<!-- 3.3V rail: J1 pin1 → J2, J3, U1 VDD -->
<polyline points="169,513 169,480 156,480 156,131 147,131" class="trace" stroke="#e04040"/>
<polyline points="169,480 527,480 527,131" class="trace" stroke="#e04040"/>
<polyline points="260,480 260,420 320,420 320,235 343,235" class="trace" stroke="#e04040"/>

<!-- GND rail -->
<polyline points="192,513 192,475 155,475 155,131 163,131" class="trace" stroke="#4060e0"/>

<!-- BCLK: J1→U1, J1→J3 -->
<polyline points="415,513 415,465 320,465 320,275 343,275" class="trace"/>
<polyline points="415,465 623,465 623,131" class="trace"/>

<!-- LRCLK: J1→U1, J1→J3 -->
<polyline points="530,513 530,460 330,460 330,290 343,290" class="trace"/>
<polyline points="530,460 600,460 600,131" class="trace"/>

<!-- I2S DOUT: J1→U1 DIN -->
