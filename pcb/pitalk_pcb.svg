<text x="487" y="258" class="net-lbl">GAIN(NC)</text>
<text x="487" y="278" class="net-lbl">OUT+</text>
<text x="487" y="298" class="net-lbl">OUT−</text>

<!-- ═══════════════════════════════════════════════════ -->
<!-- C1  100nF bypass  (0402)  near U1 VDD              -->
<!-- PCB pos: x=26mm y=22mm  →  SVG (329, 268)          -->
<!-- ═══════════════════════════════════════════════════ -->
<rect x="308" y="260" width="22" height="10" rx="1" fill="#3a3a8a" stroke="#8888cc" stroke-width="1"/>
<text x="308" y="257" class="silk silk-sm">C1</text>
<text x="308" y="283" class="net-lbl">100nF</text>

<!-- ═══════════════════════════════════════════════════ -->
<!-- C2  10µF bulk decoupling  (0402)                   -->
<!-- PCB pos: x=26mm y=27mm  →  SVG (329, 313)          -->
<!-- ═══════════════════════════════════════════════════ -->
<rect x="308" y="308" width="22" height="10" rx="1" fill="#3a3a8a" stroke="#8888cc" stroke-width="1"/>
<text x="308" y="305" class="silk silk-sm">C2</text>
<text x="308" y="331" class="net-lbl">10µF</text>

<!-- ═══════════════════════════════════════════════════ -->
<!-- R1  330Ω LED resistor  (0402)                      -->
<!-- PCB pos: x=16mm y=33mm  →  SVG (239, 367)          -->
<!-- ═══════════════════════════════════════════════════ -->
<rect x="222" y="362" width="22" height="10" rx="1" fill="#3a3a8a" stroke="#8888cc" stroke-width="1"/>
<text x="222" y="359" class="silk silk-sm">R1</text>
<text x="222" y="385" class="net-lbl">330Ω</text>

