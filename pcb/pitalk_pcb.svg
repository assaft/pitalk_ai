<polyline points="485,295 525,295 525,195 150,195 150,287 114,287" class="trace"/>

<!-- BTN LED via R1: J1→R1→J5 -->
<polyline points="370,513 370,410 234,410 234,372" class="trace"/>
<polyline points="222,367 186,367 186,415 130,415" class="trace"/>

